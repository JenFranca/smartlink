<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo -->
  <rect width="64" height="64" rx="12" fill="#0d1526"/>

  <!-- Elipse azul/verde (igual ao logo) -->
