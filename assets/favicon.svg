  <ellipse cx="34" cy="36" rx="25" ry="13" fill="none" stroke="#3a7d24" stroke-width="1.2" transform="rotate(-12 34 36)" opacity="0.85"/>

  <!-- Arcos WiFi cinza (igual ao logo) -->
