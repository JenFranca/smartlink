    <path d="M 21,42 A 13,13 0 0 1 41,42" stroke-width="4.5"/>
    <path d="M 14,34 A 21,21 0 0 1 48,34" stroke-width="4.5"/>
    <path d="M 7,26 A 31,31 0 0 1 55,26" stroke-width="4.5"/>
